<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>Playground1 — HTML5 Game</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="ad-top" class="ad-slot"></div>
  <div id="layout">
    <div id="ad-left" class="ad-slot"></div>
    <div id="game-wrapper">
      <canvas id="game"></canvas>

      <!-- START SCREEN -->
      <div id="start-screen">
        <div id="start-content">

          <!-- ═══════════════════════════════════════════════════════
               ART SLOT — drop your image file into the project folder
               then replace  src=""  with your filename, e.g. src="art.png"
               and remove the  style="display:none"
               ═══════════════════════════════════════════════════════ -->
          <img id="start-art" src="" alt="Bad Triangles" style="display:none">

          <h1 id="start-title">Bad Triangles</h1>
          <p id="start-sub">A space shooter</p>
          <button id="start-btn">PLAY</button>
          <p id="start-controls">Arrow keys / WASD to move &nbsp;·&nbsp; Space to shoot</p>
        </div>
        <p id="start-credit">Developed by Iron Dragon Games &nbsp;·&nbsp; <a href="privacy.html" style="color:#4a7a99;text-decoration:none;font-size:inherit" target="_blank">Privacy Policy</a></p>
      </div>
    </div>
    <div id="ad-right" class="ad-slot"></div>
  </div>
  <div id="ad-bottom" class="ad-slot"></div>

  <!-- LEVEL COMPLETE / NEXT LEVEL MODAL -->
  <div id="level-complete" class="hidden">
    <div id="level-complete-content">
      <h2 id="lc-title">Level 1 Complete</h2>
      <p id="lc-sub">Continue to level 2?</p>
      <div id="lc-ad" class="ad-slot modal-ad"></div>
      <div id="lc-actions">
        <button id="lc-continue">Continue</button>
      </div>
    </div>
  </div>

  <script>
  (function(){
    const ads = [
      { id:'weyland',  name:'Weyland-Yutani',   tag:'Building Better Worlds',      symbol:'⬡' },
      { id:'umbrella', name:'Umbrella Corp',      tag:'Our Business Is Life Itself', symbol:'☂' },
      { id:'cyberdyne',name:'Cyberdyne Systems',  tag:'Shaping Tomorrow, Today',     symbol:'◈' },
    ];
    // shuffle then assign, cycling if more slots than ads
    const slots = ['ad-left','ad-right','ad-top','ad-bottom','lc-ad'];
    const shuffled = [...ads].sort(()=>Math.random()-0.5);
    slots.forEach((id, i) => {
      const ad = shuffled[i % shuffled.length];
      document.getElementById(id).innerHTML =
        `<div class="ad-inner" data-co="${ad.id}">
          <div class="ad-symbol">${ad.symbol}</div>
          <div class="ad-name">${ad.name}</div>
          <div class="ad-tag">${ad.tag}</div>
        </div>`;
    });
  })();
  </script>

  <script src="src/audio.js"></script>
  <script src="src/main.js"></script>
</body>
</html>
